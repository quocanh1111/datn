# ============================================
#  MinIO (S3a) configuration (for Hadoop)
# ============================================
spark.hadoop.fs.s3a.access.key=root
spark.hadoop.fs.s3a.secret.key=password
spark.hadoop.fs.s3a.endpoint=http://storage:9000
spark.hadoop.fs.s3a.path-style-access=true
spark.hadoop.fs.s3a.connection.ssl.enabled=false
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# ============================================
#  Nessie + Iceberg catalog (native NessieCatalog)
# ============================================
spark.sql.catalog.nessie=org.apache.iceberg.spark.SparkCatalog
# ĐÃ SỬA: Cập nhật Catalog Impl chuẩn theo gói Nessie v2
spark.sql.catalog.nessie.catalog-impl=org.projectnessie.iceberg.v2.NessieIcebergCatalog
# ĐÃ SỬA: Trỏ URI về REST API v2 để khớp với gói Jar bên dưới
spark.sql.catalog.nessie.uri=http://nessie:19120/api/v2
spark.sql.catalog.nessie.ref=main
spark.sql.catalog.nessie.authentication.type=NONE
spark.sql.catalog.nessie.warehouse=s3a://silver/
spark.sql.catalog.nessie.io-impl=org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.nessie.s3.access-key-id=root
spark.sql.catalog.nessie.s3.secret-access-key=password
spark.sql.catalog.nessie.s3.endpoint=http://storage:9000
spark.sql.catalog.nessie.s3.region=us-east-1
spark.sql.catalog.nessie.s3.path-style-access=true

# ============================================
#  Iceberg & Nessie SQL extensions
# ============================================
# ĐÃ SỬA: Kích hoạt song song cả 2 Extensions để vừa chạy được Iceberg Table vừa gõ được lệnh Git của Nessie
spark.sql.extensions=org.projectnessie.spark.extensions.NessieSparkSessionExtensions,org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# ============================================
#  Performance optimisations
# ============================================
spark.sql.adaptive.enabled=true
spark.sql.adaptive.coalescePartitions.enabled=true
spark.sql.adaptive.advisoryPartitionSizeInBytes=256MB
spark.sql.iceberg.handle-timestamp-without-timezone=true
spark.sql.parquet.vectorized.reader.enabled=true

# ============================================
#  JARs (Quy chiếu chuẩn theo Spark 3.5.7)
# ============================================
spark.jars.packages=org.apache.hadoop:hadoop-aws:3.3.4,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.10.1,org.projectnessie.nessie-integrations:nessie-spark-extensions-3.5_2.12:0.103.2