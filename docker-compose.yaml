version: '3.8'

services:

  # Container for Metadata (Postgres)
  postgres:
    build:
      context: ./postgres
      dockerfile: postgres.Dockerfile
    container_name: postgres
    env_file:
      - .env/postgres.env
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/postgres_data:/var/lib/postgresql/data:rw
    restart: always
    deploy:
      resources:
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Container for Storage (Minio)
  object-storage:
    build:
      context: ./minio_data
      dockerfile: minio.Dockerfile
    container_name: storage
    volumes:
      - ./minio_data:/datn/data:rw
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env/minio.env
    stdin_open: true
    tty: true
    restart: always
    deploy:
      resources:
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Khởi tạo bucket cho MinIO
  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      object-storage:
        condition: service_healthy
    env_file:
      - .env/minio.env
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set storage http://object-storage:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing storage/bronze;
      mc mb --ignore-existing storage/silver;
      mc mb --ignore-existing storage/gold;
      mc mb --ignore-existing storage/mart;
      echo 'All buckets created';
      "

  # Container for Data Catalog (Nessie)
  nessie:
    image: ghcr.io/projectnessie/nessie:0.103.2-java
    container_name: nessie
    env_file:
      - .env/nessie.env
    depends_on:
      postgres:
        condition: service_healthy
      object-storage:
        condition: service_healthy
    ports:
      - "19120:19120"
    stdin_open: true
    tty: true
    restart: always
    deploy:
      resources:
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:19120/api/v2/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Khởi tạo database ban đầu cho Airflow
  airflow-init:
    image: python-base:latest
    container_name: airflow-init
    env_file:
      - .env/airflow.env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    environment:
      - AIRFLOW_HOME=/opt/airflow
    command: airflow db init
    depends_on:
      postgres:
        condition: service_healthy

  # Container for Orchestration (Airflow Webserver)
  airflow:
    image: python-base:latest
    container_name: airflow
    user: "root"
    env_file:
      - .env/airflow.env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "1235:8080"
    environment:
      - AIRFLOW_HOME=/opt/airflow
    command: airflow webserver
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        reservations:
          memory: 1g

  # Container for Airflow Scheduler
  airflow-scheduler:
    image: python-base:latest
    container_name: airflow-scheduler
    user: "root"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env/airflow.env
    environment:
      - AIRFLOW_HOME=/opt/airflow
    command: airflow scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow:
        condition: service_started
    deploy:
      resources:
        reservations:
          memory: 512m

  # Container for Extracting Data (Web Scraping / Jupyter)
  extraction:
    build:
      context: ./ingestion
      dockerfile: ingestion.Dockerfile
    container_name: extraction
    image: python-extraction:latest
    volumes:
      - ./ingestion:/datn/ingestion:rw
      - ./minio_data/seed/listenbrainz:/datn/raw/listenbrainz:ro
    ports:
      - "8888:8888"
    env_file:
      - .env/minio.env
    stdin_open: true
    tty: true
    restart: always
    depends_on:
      object-storage:
        condition: service_healthy
      airflow:
        condition: service_started
    deploy:
      resources:
        reservations:
          memory: 512m

  # Container for Transformations (Spark)
  transformation:
    build:
      context: ./transformation
      dockerfile: transformation.Dockerfile
    container_name: transformation
    image: python-transformation:latest
    volumes:
      - ./transformation:/datn/transformation:rw
    ports:
      - "8889:8888"
      - "4040:4040"
      - "7070:7070"
    env_file:
      - .env/minio.env
      - .env/aws.env
    environment:
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
    stdin_open: true
    tty: true
    restart: always
    depends_on:
      object-storage:
        condition: service_healthy
      postgres:
        condition: service_healthy
      nessie:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          memory: 2g

  # Container for Query Engine (Trino)
  trino:
    image: trinodb/trino:467
    container_name: trino
    ports:
      - "8000:8090"
    volumes:
      - ./trino/etc:/etc/trino:rw
      - ./trino/data:/var/trino:rw
    env_file:
      - .env/minio.env
    environment:
      - JAVA_TOOL_OPTIONS=-Duser.timezone=UTC
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      object-storage:
        condition: service_healthy
      nessie:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          memory: 3g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/v1/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Container for Visualization (Superset)
  superset:
    build:
      context: ./superset
      dockerfile: superset.Dockerfile
    container_name: superset
    depends_on:
      postgres:
        condition: service_healthy
      trino:
        condition: service_healthy
      nessie:
        condition: service_healthy
    env_file:
      - .env/postgres.env
      - .env/superset.env
    ports:
      - "8088:8088"
    restart: always
    deploy:
      resources:
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Lớp Base Image hệ thống
  base-builder:
    build:
      context: .
      dockerfile: Dockerfile.base
    image: python-base:latest